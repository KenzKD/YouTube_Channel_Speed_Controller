<!DOCTYPE html>
<html>

<head>
    <title>YouTube Speed Controller Options</title>
</head>

<body>
    <h1>Playback Speed Settings</h1>
    <label>Channel: <input id="channel" type="text"></label>
    <label>Speed: <input id="speed" type="number" step="0.25" min="0.25" max="4"></label>
    <button id="save">Save</button>
    <hr>
    <button id="export">Export Settings</button>
    <input type="file" id="importFile">
    <button id="import">Import Settings</button>
    <pre id="output"></pre>
    <script src="options.js"></script>
</body>

</html>
